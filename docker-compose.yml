services:
  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:18618:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:18617:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - qli_math_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qli_math_pgdata:
